name: Community Validation

on:
    pull_request:
        paths:
            - ".github/**"
            - "docs/**"
            - "Readme.md"
            - "CHANGELOG.md"
    push:
        branches:
            - main
        paths:
            - ".github/**"
            - "docs/**"
            - "Readme.md"
            - "CHANGELOG.md"

permissions:
    contents: read

jobs:
    validate-community-assets:
        name: Validate community assets
        runs-on: ${{ vars.GH_ACTIONS_UBUNTU_RUNNER != '' && vars.GH_ACTIONS_UBUNTU_RUNNER || 'ubuntu-24.04' }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Validate required files
              shell: pwsh
              run: |
                  $requiredFiles = @(
                    '.github/CONTRIBUTING.md',
                    '.github/CODE_OF_CONDUCT.md',
                    '.github/SECURITY.md',
                    '.github/SUPPORT.md',
                    '.github/CODEOWNERS',
                    '.github/PULL_REQUEST_TEMPLATE.md',
                    '.github/ISSUE_TEMPLATE/bug_report.yml',
                    '.github/ISSUE_TEMPLATE/feature_request.yml',
                    '.github/ISSUE_TEMPLATE/config.yml',
                    'docs/contributing/local-setup.md',
                    'docs/contributing/testing.md',
                    'docs/maintainers/architecture.md',
                    'docs/maintainers/release-process.md',
                    'docs/maintainers/deprecation-policy.md',
                    'docs/maintainers/github-setup.md',
                    'Readme.md'
                  )

                  $missing = $requiredFiles | Where-Object { -not (Test-Path $_) }

                  if ($missing.Count -gt 0) {
                    Write-Error ("Arquivos obrigatorios ausentes:`n- " + ($missing -join "`n- "))
                  }

            - name: Validate README references
              shell: pwsh
              run: |
                  $readme = Get-Content -Path 'Readme.md' -Raw

                  $expectedReferences = @(
                    '.github/CONTRIBUTING.md',
                    '.github/CODE_OF_CONDUCT.md',
                    '.github/SECURITY.md',
                    '.github/SUPPORT.md',
                    'docs/contributing/local-setup.md',
                    'docs/contributing/testing.md',
                    'docs/maintainers/architecture.md',
                    'docs/maintainers/release-process.md',
                    'docs/maintainers/deprecation-policy.md',
                    'docs/maintainers/github-setup.md'
                  )

                  $missingReferences = $expectedReferences | Where-Object { $readme -notmatch [regex]::Escape($_) }

                  if ($missingReferences.Count -gt 0) {
                    Write-Error ("README sem referencias esperadas:`n- " + ($missingReferences -join "`n- "))
                  }

            - name: Validate CHANGELOG format
              shell: pwsh
              run: |
                  $content = Get-Content -Path 'CHANGELOG.md' -Raw

                  if ($content -notmatch '## \[Não Lançado\]') {
                    Write-Error "CHANGELOG.md não contém a seção '## [Não Lançado]'"
                  }

                  if ($content -notmatch '## \[\d+\.\d+\.\d+\] - \d{4}-\d{2}-\d{2}') {
                    Write-Error "CHANGELOG.md não contém nenhuma release no formato '## [x.y.z] - yyyy-mm-dd'"
                  }

                  $forbidden = @('Planned Features', 'Aguardando', 'Current Version', 'Technical Debt')
                  foreach ($section in $forbidden) {
                    if ($content -match [regex]::Escape("### $section")) {
                      Write-Error "CHANGELOG.md contém seção proibida: '### $section'"
                    }
                  }
