name: Workflow Validation

on:
    pull_request:
        paths:
            - ".github/workflows/**"
    push:
        branches:
            - main
        paths:
            - ".github/workflows/**"

permissions:
    contents: read

jobs:
    actionlint:
        name: Lint workflows
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Lint GitHub Actions workflows
              uses: rhysd/actionlint@v1
