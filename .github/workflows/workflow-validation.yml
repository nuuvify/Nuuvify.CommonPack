name: Workflow Validation

on:
    pull_request:
        paths:
            - ".github/workflows/**"
    push:
        branches:
            - main
        paths:
            - ".github/workflows/**"

permissions:
    contents: read

jobs:
    actionlint:
        name: Lint workflows
        runs-on: ${{ vars.GH_ACTIONS_UBUNTU_RUNNER != '' && vars.GH_ACTIONS_UBUNTU_RUNNER || 'ubuntu-24.04' }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Lint GitHub Actions workflows
              uses: rhysd/actionlint@v1
