name: PR Triage

on:
    pull_request_target:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review

permissions:
    contents: read
    pull-requests: write

jobs:
    label-by-path:
        name: Label PR by path
        runs-on: ${{ vars.GH_ACTIONS_UBUNTU_RUNNER != '' && vars.GH_ACTIONS_UBUNTU_RUNNER || 'ubuntu-24.04' }}

        steps:
            - name: Auto label PR
              uses: actions/labeler@v5
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
                  configuration-path: .github/labeler.yml
